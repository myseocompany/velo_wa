services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: velo
      POSTGRES_USER: velo
      POSTGRES_PASSWORD: secret
      # Creates extra DBs on first boot via initdb scripts
      POSTGRES_MULTIPLE_DATABASES: velo,velo_evolution
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velo -d velo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    # AOF persistence: survive container restarts without losing queued jobs
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      # Database (Prisma + PostgreSQL)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://velo:secret@postgres:5432/velo_evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      # Cache
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      # Webhooks
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:8000/api/v1/webhooks/evolution?apikey=${EVOLUTION_API_KEY:-changeme}
      WEBHOOK_GLOBAL_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      # QR & misc
      QRCODE_LIMIT: "30"
      LANGUAGE: pt-BR
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue-worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work --queue=whatsapp,default --tries=3 --timeout=60 --sleep=1
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: velo
      DB_USERNAME: velo
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: host.docker.internal
      REVERB_PORT: 6001
      REVERB_SCHEME: http
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      EVOLUTION_API_URL: http://evolution-api:8080
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
  minio_data:
  redis_data:
