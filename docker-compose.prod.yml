# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Prerequisites:
#   - Copy .env.production.example to .env and fill all values
#   - Build app image: docker compose -f docker-compose.prod.yml build app
#   - Run migrations: docker compose -f docker-compose.prod.yml exec app php artisan migrate --force

services:

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - app_net

  # ── PHP-FPM application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.prod
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EVOLUTION_API_URL: http://evolution-api:8080
    env_file: .env
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  # ── Horizon (queue workers) ───────────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.prod
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - app
    networks:
      - app_net

  # ── Reverb WebSocket server ───────────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.prod
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --port=6001 --host=0.0.0.0
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "6001:6001"
    depends_on:
      - app
    networks:
      - app_net

  # ── Scheduler ─────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.prod
    restart: unless-stopped
    working_dir: /var/www/html
    # Runs artisan schedule:run every minute using a simple loop
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - app
    networks:
      - app_net

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-velo}
      POSTGRES_USER: ${DB_USERNAME:-velo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${DB_DATABASE:-velo},velo_evolution
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-velo} -d ${DB_DATABASE:-velo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  # ── Evolution API (WhatsApp) ──────────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USERNAME:-velo}:${DB_PASSWORD}@postgres:5432/velo_evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_URL: ${APP_URL}/api/v1/webhooks/evolution?apikey=${EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      QRCODE_LIMIT: "30"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  # ── Certbot (SSL certificate renewal) ────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run manually: docker compose -f docker-compose.prod.yml run certbot renew
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew; sleep 12h; wait $${!}; done"

volumes:
  pgdata:
  redis_data:
  certbot_www:

networks:
  app_net:
    driver: bridge
